name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install warden (dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest -q

      - name: Benchmark smoke run
        run: python benchmark/run_benchmark.py

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: gitleaks scan (working tree, not git-log diff)
        # gitleaks-action's default push-event git-log diff mode assumes a
        # base SHA that predates the repo's own root commit, which breaks
        # on a fresh history -- scan the checked-out tree directly instead.
        run: gitleaks detect --source . --no-git --redact -v
