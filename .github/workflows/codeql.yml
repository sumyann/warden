name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan catches new CodeQL query packs / advisories even when
    # nothing in the repo changed.
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
          # benchmark/servers/ is vendored, commit-pinned upstream source from
          # third-party MCP server repos (see benchmark/refresh_fixtures.py) --
          # not code we wrote or can fix, same rationale as the gitleaks
          # allowlist in .gitleaks.toml. examples/vulnerable-demo/ is our own
          # intentionally-vulnerable fixture, not real shipped code either.
          paths-ignore:
            - benchmark/servers/**
            - examples/vulnerable-demo/**

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
