title = "warden gitleaks config"

[extend]
useDefault = true

# examples/vulnerable-demo/ is intentionally full of fake secrets used to
# demonstrate Warden's own detection rules -- see
# examples/vulnerable-demo/README.md.
#
# tests/ contains intentional fake secret literals (e.g. sk-abc123...) used
# as fixtures for the W003 credential-detection rule's own test suite --
# not real credentials.
#
# benchmark/servers/ is vendored, commit-pinned upstream source from
# third-party MCP server repos (see benchmark/refresh_fixtures.py) -- not
# code we wrote or can fix. Confirmed 2026-07-22 that gitleaks' hits here
# are a legitimately-public PostHog client ingest key (upstream's own
# comment says so), a variable-name false match with no actual token
# value, and an explicit dummy/mock key in a test file -- none are real
# secrets.
[allowlist]
paths = [
  '''examples/vulnerable-demo/.*''',
  '''tests/.*''',
  '''benchmark/servers/.*''',
]
