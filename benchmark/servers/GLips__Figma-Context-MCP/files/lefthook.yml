pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ts,js,json,md}"
      run: pnpm prettier --write {staged_files} && git add {staged_files}
    lint:
      glob: "*.{ts,js}"
      run: pnpm eslint {staged_files}
    type-check:
      glob: "*.{ts,js}"
      run: pnpm type-check
    scan-hidden-chars:
      glob: "*.{ts,js,mjs,cjs,json,md,yml,yaml}"
      run: node scripts/scan-hidden-chars.mjs {staged_files}
